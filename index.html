<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Profissionais - Jd Maria Rosa</title>
    <style>
        :root { --azul: #004a99; --azul-claro: #eef2f7; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: var(--azul); color: white; padding: 25px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }

        .sessao-cadastro { max-width: 450px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .sessao-cadastro h2 { color: var(--azul); text-align: center; font-size: 16px; margin-top: 0; border-bottom: 2px solid var(--azul-claro); padding-bottom: 15px; text-transform: uppercase; margin-bottom: 25px; }
        
        .campo { margin-bottom: 20px; }
        .campo label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 8px; color: #444; }
        .campo input, .campo select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        .campo input:focus { border-color: var(--azul); outline: none; box-shadow: 0 0 5px rgba(0,74,153,0.2); }
        
        .info-controle { font-size: 11px; color: #cc0000; font-weight: normal; margin-left: 4px; }
        .instrucao { font-size: 11px; color: #888; display: block; margin-top: 5px; }

        .btn-publicar { width: 100%; background: var(--azul); color: white; border: none; padding: 16px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 14px; margin-top: 10px; }
        .btn-publicar:hover { background: #003366; transform: translateY(-1px); }
        .btn-publicar:disabled { background: #ccc; cursor: not-allowed; }

        footer { text-align: center; padding: 20px; font-size: 12px; color: #999; margin-top: auto; }
    </style>
</head>
<body>

<header>
    <h1>GUIA DE PROFISSIONAIS</h1>
</header>

<div class="sessao-cadastro">
    <h2>Indicar um Profissional</h2>
    
    <form id="formIndicar">
        <div class="campo">
            <label>Seu Nome <span class="info-controle">(Somente para controle interno)</span></label>
            <input type="text" name="morador" placeholder="Seu nome completo" required>
        </div>

        <div class="campo">
            <label>Seu Apartamento <span class="info-controle">(Somente para controle interno)</span></label>
            <input type="text" name="apartamento" placeholder="Ex: 102-A" required>
        </div>

        <div class="campo">
    <label>Categoria do Profissional</label>
    <select name="profissional" required>
        <option value="">Selecione...</option>
        <option value="Azulejista">Azulejista</option>
        <option value="Carpinteiro">Carpinteiro</option>
        <option value="Chaveiro">Chaveiro</option>
        <option value="Costureira">Costureira</option>
        <option value="Eletricista">Eletricista</option>
        <option value="Encanador / Bombeiro">Encanador / Bombeiro</option>
        <option value="Faxineira">Faxineira</option>
        <option value="Gesseiro">Gesseiro</option>
        <option value="Marceneiro">Marceneiro</option>
        <option value="Marido de Aluguel">Marido de Aluguel</option>
        <option value="Pedreiro">Pedreiro</option>
        <option value="Pintor">Pintor</option>
        <option value="Serralheiro">Serralheiro</option>
        <option value="Técnico em Ar-condicionado">Técnico em Ar-condicionado</option>
        <option value="Técnico em Eletrodomésticos">Técnico em Eletrodomésticos</option>
        <option value="Técnico em Geladeira">Técnico em Geladeira</option>
        <option value="Técnico em Máquina de Lavar">Técnico em Máquina de Lavar</option>
        <option value="Vidraceiro">Vidraceiro</option>
        </select>
</div>

        <div class="campo">
            <label>Nome do Profissional (Contato)</label>
            <input type="text" name="nomeProfissional" placeholder="Nome de quem você indica" required>
        </div>

        <div class="campo">
            <label>WhatsApp do Profissional</label>
            <input type="text" name="telefone" id="inputTel" placeholder="Ex: 11988887777" required maxlength="11">
            <span class="instrucao">Digite apenas números (DDD + Número)</span>
        </div>

        <button type="submit" class="btn-publicar" id="btnEnviar">Publicar Indicação</button>
    </form>
</div>

<footer>
    Condomínio Jardim Maria Rosa &copy; 2026
</footer>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwIiiSuQ5vnRbJfh01F1t8XkYvmNXfPaSyH9eZTN4zECcQ_JfYAHdyy2FAR9yqJxhto/exec"; 

    // Bloqueia letras no campo telefone
    document.getElementById('inputTel').addEventListener('input', function (e) {
        this.value = this.value.replace(/\D/g, '');
    });

    document.getElementById('formIndicar').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.innerText = "Enviando...";
        btn.disabled = true;
        
        const formData = new FormData(e.target);
        const objeto = {
            morador: formData.get('morador'),
            apartamento: formData.get('apartamento'),
            profissional: formData.get('profissional'),
            nomeProfissional: formData.get('nomeProfissional'),
            telefone: formData.get('telefone')
        };
        
        try {
            await fetch(URL_SCRIPT, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify(objeto)
            });
            alert("Sucesso! Sua indicação foi enviada e em breve aparecerá no guia.");
            e.target.reset(); // Limpa o formulário
            btn.innerText = "Publicar Indicação";
            btn.disabled = false;
        } catch (err) {
            alert("Erro ao enviar. Verifique sua conexão.");
            btn.innerText = "Publicar Indicação";
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
