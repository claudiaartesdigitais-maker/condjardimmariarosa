<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --azul: #004a99; --azul-claro: #f0f4f8; --verde: #25d366; --borda: #e1e8ed; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: transparent; color: #333; }
        
        .container-lista { background: white; border-radius: 8px; overflow: hidden; border: 1px solid var(--borda); }

        /* Filtros */
        .filtros { display: flex; overflow-x: auto; padding: 12px; gap: 8px; background: #fff; border-bottom: 1px solid var(--borda); scrollbar-width: none; }
        .filtros::-webkit-scrollbar { display: none; }
        .btn-filtro { background: var(--azul-claro); border: none; padding: 7px 14px; border-radius: 15px; white-space: nowrap; cursor: pointer; color: var(--azul); font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .btn-filtro.ativo { background: var(--azul); color: white; }

        /* Linha do Profissional */
        .linha-profissional { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 12px 15px; 
            border-bottom: 1px solid var(--borda);
        }
        .linha-profissional:last-child { border-bottom: none; }
        
        .info { display: flex; align-items: center; gap: 15px; flex: 1; }
        .cat-texto { font-size: 15px; font-weight: 800; color: var(--azul); min-width: 130px; text-transform: uppercase; }
        .nome-texto { font-size: 14px; font-weight: 600; color: #444; }

        .btn-zap-link { 
            background: var(--verde); 
            color: white; 
            text-decoration: none; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }

        #msg-vazio { text-align: center; color: #999; padding: 30px; font-style: italic; font-size: 13px; }

        @media (max-width: 500px) {
            .info { flex-direction: column; align-items: flex-start; gap: 2px; }
            .cat-texto { font-size: 12px; min-width: auto; }
            .nome-texto { font-size: 13px; }
            .btn-zap-link span { display: none; }
        }
    </style>
</head>
<body>

<div class="container-lista">
    <div class="filtros" id="botoesFiltros">
        <button class="btn-filtro ativo" onclick="filtrar('Todos', this)">Todos</button>
    </div>
    <div id="lista-corpo">
        <div id="msg-vazio">Buscando profissionais...</div>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbz3r-SbmkbGMN8w2TGv64eVUrlGPooHamByuMgO-myv2q8q3Upb8NK3DafDAZkBlo66Mw/exec"; 
    let dadosGerais = [];

    async function buscarDados() {
        try {
            const res = await fetch(URL_SCRIPT);
            const rawData = await res.json();
            
            // FILTRO E ORDENAÇÃO:
            // 1. Remove linhas vazias
            // 2. Ordena de A-Z pela Categoria
            dadosGerais = rawData
                .filter(i => i.Categoria && i.Contato)
                .sort((a, b) => a.Categoria.localeCompare(b.Categoria));

            renderizar(dadosGerais);
            gerarFiltros(dadosGerais);
        } catch (e) {
            document.getElementById('msg-vazio').innerText = "Erro ao carregar dados.";
        }
    }

    function gerarFiltros(dados) {
        const cats = [...new Set(dados.map(i => i.Categoria))].sort();
        const btnF = document.getElementById('botoesFiltros');
        btnF.innerHTML = '<button class="btn-filtro ativo" onclick="filtrar(\'Todos\', this)">Todos</button>';
        cats.forEach(c => {
            btnF.innerHTML += `<button class="btn-filtro" onclick="filtrar('${c}', this)">${c}</button>`;
        });
    }

    function renderizar(dados) {
        const corpo = document.getElementById('lista-corpo');
        if(dados.length === 0) {
            corpo.innerHTML = '<div id="msg-vazio">Nenhum profissional cadastrado.</div>';
            return;
        }
        corpo.innerHTML = dados.map(item => `
            <div class="linha-profissional">
                <div class="info">
                    <span class="cat-texto">${item.Categoria}</span>
                    <span class="nome-texto">${item.Contato}</span>
                </div>
                <a href="https://wa.me/55${item.Telefone.replace(/\D/g,'')}" class="btn-zap-link" target="_blank">
                    📱 <span>WhatsApp</span>
                </a>
            </div>
        `).join('');
    }

    function filtrar(cat, elemento) {
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('ativo'));
        elemento.classList.add('ativo');
        if(cat === 'Todos') renderizar(dadosGerais);
        else renderizar(dadosGerais.filter(i => i.Categoria === cat));
    }

    buscarDados();
</script>
</body>
</html>
